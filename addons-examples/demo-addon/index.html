<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Demo Addon</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        background: #1e1f22;
        color: #e8e8ea;
      }
      button {
        margin: 4px 8px 4px 0;
        padding: 8px 14px;
        cursor: pointer;
        border: 1px solid #444;
        border-radius: 6px;
        background: #2a2b2e;
        color: inherit;
      }
      button:hover {
        background: #35363a;
      }
      pre {
        background: #111;
        padding: 10px;
        border-radius: 6px;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 220px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h2>Demo Addon</h2>
    <p>
      Sample addon: runs in its own sandboxed iframe (no direct access to Node/Electron), and can only talk to the
      dashboard through the permission-checked bridge declared in its manifest.json.
    </p>
    <button id="btn-containers">List containers (containers:read)</button>
    <button id="btn-images">List images (images:read)</button>
    <button id="btn-delete">Try to remove an image (images:write - should be denied)</button>
    <pre id="out">(result appears here)</pre>

    <script>
      // Minimal request/response bridge over postMessage - the parent
      // (AddonsView.tsx) is the only thing on the other end, and it
      // checks every call against this addon's own manifest.permissions
      // before doing anything.
      let nextCallId = 1;
      const pending = new Map();

      window.addEventListener("message", (event) => {
        const msg = event.data;
        if (!msg || msg.type !== "kiln-addon-result") return;
        const resolve = pending.get(msg.callId);
        if (!resolve) return;
        pending.delete(msg.callId);
        resolve(msg);
      });

      function call(method, args = []) {
        const callId = nextCallId++;
        return new Promise((resolve) => {
          pending.set(callId, resolve);
          window.parent.postMessage({ type: "kiln-addon-call", callId, method, args }, "*");
        });
      }

      function show(result) {
        document.getElementById("out").textContent = JSON.stringify(result, null, 2);
      }

      document.getElementById("btn-containers").onclick = async () => show(await call("containers.list"));
      document.getElementById("btn-images").onclick = async () => show(await call("images.list"));
      document.getElementById("btn-delete").onclick = async () => show(await call("images.remove", ["deadbeefdeadbeef"]));
    </script>
  </body>
</html>
